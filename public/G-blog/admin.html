<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#811827">
    <title>Tutap4500 Blog</title>
    <link rel="icon"  href="../G-blog/icon192.png" type="image/icon">
    <link rel="stylesheet" href="../G-blog/style.css">
    <link rel="manifest"   href="../G-blog/manifest.json">
    <!-- Load app.js -->
    <script src="../G-blog/app.js"></script>    
  </head>

  <body>
    <header class="navbar">
      <div class="container nav-content">
        <a href="/" class="logo">Tutap4500 Blog</a>
        <nav>
          <a href="/blog">Home</a>
          <a href="/admin" class="active">Admin</a>
          <a href="/post" >Posts</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <h1 style="color:ccc999"> Admin Panel</h1>

      <section class="card">
        <h2 style="color:aaa000"> Create / Edit Post</h2>
        <form id="post-form">
          <input type="hidden" id="post-id">

          <label>
            Title *
            <input type="text" id="post-title" required placeholder="required">
          </label>

          <label>
            Excerpt *
            <textarea id="post-excerpt" rows="2" required placeholder="required"></textarea>
          </label>

          <label>
            Content * (HTML allowed) 
            <did id="tag-tag" tile="">
              <span id="tag-did">did</span> |  
              <span id="tag-hig">hig</span> | 
              <span id="tag-b">b</span> | 
              <span id="tag-u">u</span> | 
              <span id="tag-i">i</span> | 
              <span id="tag-h2">h2</span> | 
              <span id="tag-h3">h3</span> | 
              <span id="tag-code">code</span> | ,,,
            </did>
            <textarea id="post-content" rows="12" required placeholder="Enter text.."></textarea>
          </label>

          <label>
              Post-category
              <textarea id="post-category" rows="1" placeholder="select category"></textarea>
              <select id="category-filter" class="search">
                <option value="">All categories</option>
              </select>
          </label>

          <button type="submit" class="btn-primary">Save Post</button>
          <button type="button" class="btn-secondary" id="reset-form">Clear</button>
        </form>
      </section>

      <section class="card">
        <h2 style="color:111999"> Existing Posts</h2>
        <div id="admin-posts-list"></div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <button id="dark-toggle" class="dark-btn">🌓 <did>darkmode</did></button><u id="adminpin"></u>
        <p title="Dapvv4500 -24.05.2026 -update format text.">© <span id="year"></span> Tutap4500 Blog. All rights reserved.</p>
      </div>
      <div style="font-size: smaller;" title="Backup / restore Posts.">
        <span id="backupLS" cursor="pointer" title="saveLocalStorage()" > | Backup Posts</span>
        <span id="restoreLS" title="restoreLocalStorage()"> | Restore Posts |</span>
        <input type="file" id="restoreFile" accept="application/json" style="display: none;">
      </div>
    </footer>

    <!-- serviceWorker -->
    <script>
      if ('serviceWorker' in navigator) {
          console.log('** serviceWorker.register ** admin');
          navigator.serviceWorker.register('../G-blog/blog_worker.js')
              .then(() => { 
                  console.log('\n1- ✅Service Worker Registered (blog-worker.js)\n');
                  //alert('1- ✅Service Worker Registered (blog-worker.js)');
              })
              .catch(err => console.warn('\n2- ❌ blog-worker.js -> Service Worker Error: \n'+ err, "\n"));
      }     
      
      const el = (id) => document.getElementById(id);
      // footer
      el('year').textContent = new Date().getFullYear();
      // Load form
      initAdminPage();
      // category click - process
      const pcat = el("post-category");
      el("category-filter").addEventListener('click', e => {
        pcat.innerText = e.target.value;
        pcat.value = e.target.value; 
      });
      // clear- reset form
      el("reset-form").addEventListener('click', e => {
        console.log(0.666, 'clear form :', e.target.value);
        el("post-title").value = "";
        el("post-excerpt").value = "";
        el("post-content").value = "";
        el("post-category").value = "";
      });
    </script>

    <!-- save LocalStorage    //el("backupLS").onclick = --> 
    <script>
      // div
      el("backupLS").addEventListener('click', ev =>{
        ev.preventDefault();
        saveLocalStorage();
      });
      // div
      el("restoreLS").addEventListener('click', e => {
        e.preventDefault();
        el("restoreFile").click();
      });
      // input file picker
      el("restoreFile").onchange = e => {
        if(e.target.files.length > 0) {
          const pickedFile = e.target.files[0];
          const pickedMess = pickedFile.name +'\n--' + pickedFile.lastModifiedDate;
          // restore from file.json
          restoreLocalStorage(pickedFile);
          console.log('You picked the file : "' + pickedMess +'" for restore ...');
        }
      };
    </script>

    <!-- Text area box --> 
    <script>
      const tagtag = el('tag-tag');
      const pcont = el('post-content');
      el('tag-did').addEventListener('click', ()=> {tagtag.title = 'did>'});
      el('tag-hig').addEventListener('click', ()=> {tagtag.title = 'hig>'});
      el('tag-b').addEventListener('click', ()=> {tagtag.title = 'b>'});
      el('tag-u').addEventListener('click', ()=> {tagtag.title = 'u>'});
      el('tag-i').addEventListener('click', ()=> {tagtag.title = 'i>'});
      el('tag-h2').addEventListener('click', ()=> {tagtag.title = 'h2>'});
      el('tag-h3').addEventListener('click', ()=> {tagtag.title = 'h3>'});
      el('tag-code').addEventListener('click', ()=> {tagtag.title = 'code>'});
      pcont.addEventListener('selectionchange', ev => {
        let start = pcont.selectionStart;
        let end = pcont.selectionEnd;
        let pvalue = pcont.value;
        if (start !== end) {
          pcont.title = pcont.value.substring(start, end);
          var changed = '';
          if (tagtag.title.trim() !=='' && pcont.title.trim() !=='') {
            changed = '<' + tagtag.title + pcont.title + '</' + tagtag.title 
            pcont.value = pvalue.replaceAll(pcont.title, changed);
            console.log(start, end, changed, pcont.value);
          };
          tagtag.title = '';
          pcont.title = '';
          changed = '';
          // Update 24-05-2026 
        }
      });

    </script>
  </body>
</html>
