<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="theme-color" content="#811827">
  <title>Tutap4500 Blog</title>
  <link rel="icon"       href="../G-blog/icon192.png" type="image/icon">
  <link rel="stylesheet" href="../G-blog/style.css">
	<link rel="manifest"   href="../G-blog/manifest.json">
  <!-- Load app.js -->
  <script src="../G-blog/app.js"></script>    
</head>
  <body>
    <header class="navbar">
      <div class="container nav-content">
        <a href="/" class="logo">Tutap4500 Blog</a>
        <nav>
          <a href="/blog" class="active">Home</a>
          <a href="/admin">Admin</a>
          <a href="/post">Posts</a>
        </nav>
      </div>
    </header>
    <!-- Search box -->
      <input id="search-input" class="search" placeholder="Search posts..." title="Search by {Title} of posts..">
      <div id="searcher" style="color:rgb(55, 155, 255); font-size: small;">v26.05.2026</div>
      <select id="category-filter" class="search"  title="Search by {Category} of posts..">
        <option value="">All categories</option>
      </select>
    <!-- Display Posts -->
    <main class="container">
      <h2 style="color: 999999;" title="Updated 06.05.2026">Latest Posts</h2>
      <div id="posts-list" class="posts-grid"></div>
    </main>

    <footer class="footer">
      <div class="container">
        <button id="dark-toggle" class="dark-btn">🌓 <hig>darkmode</hig></button>
        <div title="Dapvv4500-06.05.2026-TTS updated.">© <span id="year"></span> Tutap4500 Blog. All rights reserved.</div>
      </div>
    </footer>

    <!-- 	WPA - responsive web app  -->
    <script>
      if ('serviceWorker' in navigator) {
        console.log('* serviceWorker.register * /index.html');
        navigator.serviceWorker.register('../G-blog/blog_worker.js')
          .then(() => { 
            console.log('\n1- ✅Service Worker Registered (blog-worker.js)\n');
            //alert('1- ✅Service Worker Registered (blog-worker.js)');
          })
          .catch(err => console.log('\n2- ❌ (blog-worker.js) -> Service Worker Error: \n'+ err, "\n"));
      }
      // footer
      document.getElementById('year').textContent = new Date().getFullYear();
      renderPostsList();
      //
      const ele = (id) => document.getElementById(id);
      const search_ = ele("search-input");
      const catego_ = ele("category-filter");
      const searcher = ele("searcher");

      // Category search //
      catego_.addEventListener('click', ev => {
        console.log(0.555, 'Category search: ', ev.target.value);
        search_.value = "";
        if (ev.target.value !== "") { 
          searcher.innerText = "Category: " + ev.target.value;
          searchByCat();
        } else renderPostsList();
      });

      // Title search //
      search_.addEventListener('input', e => {
        console.log(0.666, 'title search :', e.target.value);
        if (e.target.value !== "") { 
          searcher.innerText = "Title: " + e.target.value;
          renderPostsList();
        }
      });

    </script>

  </body>
</html>
