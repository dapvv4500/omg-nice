<!DOCTYPE html>
<html lang="en">
    <head>
        <meta ContentType= "text/html" charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="../D-expense/icon192.png" type="image/x-icon">
        <title>Simple Expenditure Tracker</title>

        <style>
            body {
                font-family: "Segoe UI", Arial, sans-serif;
                background: #f4f4f9;
                margin: 0;
                text-align: center;
            }
            .container {
                max-width: 100%;
                margin: 0px;
                padding: 0px;
                border: 1px solid #ccc;
                border-radius: 5px;
            }
            #budget-click {
                background: #815583;
                color: white;
                padding: 5px;
                margin-top: 8px;
                margin-bottom: 15px;
                font-size: 1.4em;
                border-radius: 5px;
            }
            #expense-name   { color: #1900ff; }
            #expense-amount { color: #a50903; }
            select          { color: #04631c; }
            input, select {
                width: 96%;
                padding: 8px;
                margin: 8px;
                box-sizing: border-box;
                border: 1px solid #ccc;
                border-radius: 6px;
                font-size: 1.2em;
            }
            button {
                width: 50%;
                background: #28a745;
                color: white;
                font-weight: bold;
                padding: 8px;
                border: none;
                border-radius: 6px;
                text-align: center;
            }
            button:active { background: #a283fa; }
            table {
                width: 100%;
                margin: 4px;
                border-collapse: collapse;
                font-size: 1.1rem;
                overflow: hidden;
                white-space: nowrap;
            }
            th {
                background-color: #a48ca5;
                color: whitesmoke;
                padding: 3px;
                text-align: left;
                overflow: hidden;
                white-space: nowrap;

            }
            td {
                padding: 4px;
                text-align: left;
                font-weight: normal;
                color: grey;
                overflow: hidden;
                white-space: nowrap;
                text-overflow: ellipsis; 
                max-width: 120px; /* Adjust this to your desired column width */
                white-space: nowrap;
            }
            .highlight { 
                color: #770077; 
                font-size: 0.8rem;
                cursor: pointer;
                padding: 4px;
                border: 1px dotted #77f3e2;
            }
            .exptotal { 
                color: #a77c7c;
                text-align: right;
                font-size: 0.9rem;
                padding: 4px 0 ;
            }
            #advance { color: #73b4ff;}
            #forward { color: #419efc;}
            #budget-amount, #addMess { color: #f0bef1; font-size: 0.9rem;}
            #budget-click, #fresh-2, #exportToCsv { cursor: pointer;}

            /* background-image: url('./learn_more.jpg'); */
            .full-scr-img {
                background-size: contain;
                background-position: center;
                background-repeat: no-repeat;
            }
            /* Make it feel like a mobile card */
            .x-view { cursor: pointer; }
            @media (max-width: 600px) {}
        </style>
    </head>
    <body>
        <div class="container">
	    <img src="" id="learn--more" class="full-scr-img" alt="">

	    <span id="advance" title="budget include $advance amount "> Advance:</span> |
	    <span id="forward" title="budget plus $balance /forward amo."> Forward:</span>

	    <span title="Pure html,css,JavaScript - @dapvv4500-v.09.10.2025 - (R)all right reserved."
	          id="learnmore" class="highlight"> > learn more ></span>

	    <div title="may click to add budget amount - 09.10.2025"
        	 id="budget-click">Expenditure Personal - 💰
	        <span id="budget-amount" title="Sum ( 1 + 2 )"> $ budget = adv + for $</span></div>

	    <label for="expense-name"></label>
	    <input type="text" id="expense-name" placeholder="Expense Name">

	    <label for="expense-amount"></label>
	    <input type="number" id="expense-amount" placeholder="Amount">

            <select id="expense-category" title="what? 6=advance; 7=forward, balancce.">
                <option value=""                >'select a category'        </option>
                <option value="petrol-transport">1- Petrol-transport 🚗     </option>
                <option value="repair-bills"    >2- Repair-bills 🛠️📵       </option>
                <option value="personal-exp"    >3- Food-shopping 🙈😁      </option>
                <option value="other-exps"      >4- Other-exps 🙏🫧           </option>
                <option value="card-exps"       >5- Card-exps 💴🗣             </option>
                <option value="advance"         >6- $Advance-amo 💳(budget)    </option>
                <option value="forward"         >7- $Forward-amo 💷(budget)    </option>
            </select>
            
            <button id="add-Button" onclick="addExpense()">✅ Add Expense</button>
            <div id="add-mess" class="exptotal" 
                 title="Pure html,css,JavaScript -@v.26.09.2025 -(R)all right reserved.">
                 { 🔀clean source code safe for usage - dapvv4500 }
            </div> <hr>

            <span id="fresh-2" title="Click to reload - refresh .."> <b> Expenses🔥Tracker</b> </span>
            <span id="exportToCsv" class="highlight" title="Export expenses to Excel format *.csv ">> exportToCsv ></span>
            
            <p>
                <span class="exptotal">'xTotal'= </span><b><span id="total-mess">...</span></b> 
                <span id="month-1" class="highlight">⬅️</span> 
                <span id="month-label" class='exptotal' title="this month / last month -> refresh ->">🔕...</span>
                <span id="month+1" class="highlight">➡️</span> 
            </p>

            <table id="expense-table" class="table">
                <colgroup>
                    <col style="width:40%;">
                    <col style="width:20%;">
                    <col style="width:15%;">
                    <col style="width:12%;">
                    <col style="width:12%;">
                </colgroup>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Amount</th>
                        <!-- <th>Category</th> -->
                        <th>Date    </th>
                        <th>Action </th>
                    </tr>
                </thead>
                <tbody id="expense-list">
                </tbody>
            </table>
        </div><br>
        <div id="icons" title="click, add to 'exp name'."> </div> 
        
        <script> 
            const icons     = document.getElementById('icons');
            const myString  = "HideMe 📵 🛴 👍 👁 ✋ 🍫 💴 ✅ ⏺ 🚗 🫧 😺 🐈 👀 🍿 💦 ❣ 🚕 🛢 🧈 💷 💳 💣 📮  🔜 🔙 🔀 ❌ 🧰 🛠️  ⏩ ⏪"
            const iarray    = myString.split(/\s+/);
            let newString   = "";
            if (iarray.length > 0 ) {
                iarray.forEach( icon => { 
                    newString += `<span style="cursor: pointer;" class="w-clickable" 
                                    data-word="${icon}"> ${icon}</span>`;
                });
                icons.innerHTML = newString;
            };
            icons.addEventListener('click', (e) => {
                if (e.target && e.target.classList.contains('w-clickable')){
                    const word = e.target.dataset.word;
                    e.target.style.backgroundColor = 'yellow';
                    if ( word == 'HideMe') {
                        icons.style.display='none';
                    } else {
                        nameInput.value = nameInput.value.trim() + word;
                    }
                }
            })

            const advanceAmo = document.getElementById('advance');      // add advance
            const forwardAmo = document.getElementById('forward');      // span forward

            const clickbudget = document.getElementById('budget-click');     // for Click
            const amobudget   = document.getElementById('budget-amount');    // span budget

            const nameInput     = document.getElementById('expense-name');  // input
            const amountInput   = document.getElementById('expense-amount');
            const categoryInput = document.getElementById('expense-category'); 

            const addButton     = document.getElementById('add-Button');    // button
            const exportButton  = document.getElementById('exportToCsv');
            
            const addmess       = document.getElementById('add-mess');      // messages
            const totalmess     = document.getElementById('total-mess');
            
            let xtotal = 0;  // Total exp
            let budget = 0; // Sum budget
            let budCount = 0; // how many budget entered //

            /* ------------ */// monthButton.title;
            const monthlabel  = document.getElementById('month-label');
            const month_1  = document.getElementById('month-1');
            const monthx1  = document.getElementById('month+1');

            var monthNumber = new Date().getMonth() ;
            var yearNumber  = new Date().getFullYear();
            monthlabel.innerText = monthConvert( monthNumber );
            // Click
             month_1.addEventListener('click', () => {
                monthNumber -= 1;
                if (monthNumber < 0 ) monthNumber = 11;
                monthlabel.innerText = monthConvert( monthNumber );
                addmess.innerText = monthNumber;
                advanceAmo.innerText=''; forwardAmo.innerText=''; amobudget.innerText='';
                loadExpenses();
                icons.style.display='block';
            }); 
            // Click
            monthx1.addEventListener('click', () => {
                if (monthNumber >= 11 ) {monthNumber = 0} else monthNumber += 1;
                monthlabel.innerText = monthConvert( monthNumber );
                addmess.innerText = monthNumber;
                advanceAmo.innerText=''; forwardAmo.innerText=''; amobudget.innerText='';
                loadExpenses(); 
                icons.style.display='block';
            }); 
            // helper
            function monthConvert(month) {
                let monthName = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
                if ( month < 0 ) { yearNumber -= 1; month = 11 };
                const retVal = monthName[month] +'-'+ yearNumber ;   //console.log(retVal, month);
                return retVal;
            }
            /* ------------ */
            /* add clickable functions */
            document.addEventListener('DOMContentLoaded', () => { loadExpenses() });
            document.getElementById('fresh-2').addEventListener('click', () => { loadExpenses() });
            // export
            exportButton.addEventListener('click', () => { exportToCsv() });
            // Expenditure Personal -> add budget
            clickbudget.addEventListener('click', () => {
                nameInput.value         = 'advance-balance-forward';
                amountInput.placeholder = "0.0 - 'Add Expense' for advance /forward";
                categoryInput.value     = 'advance';
                addButton.innerText     = 'Add budget';
            });
            //  provide info -> budget //
            advanceAmo.addEventListener('click', ()=>{
                addmess.innerText = advanceAmo.title;
                alert( "1-this can be Bank, ATM balance, $cash advance ..");
                setTimeout ( () => { addmess.innerText='' }, 7000);
            });
            forwardAmo.addEventListener('click', ()=>{
                addmess.innerText = forwardAmo.title;
                alert( "2-other can be $$ forward or any other source!!" );
                setTimeout ( () => { addmess.innerText='' }, 7000);
            });
            categoryInput.addEventListener("change", ()=>{
                let tem_adv = advanceAmo.innerText.split(/[':']/);
                let tem_for = forwardAmo.innerText.split(/[':']/);
                //console.log (tem_adv[1], tem_for[1],'******************',parseFloat(tem_adv[1]),parseFloat(tem_for[1])) ;
                nameInput.placeholder = '';
                nameInput.value = '' + categoryInput.value; 
                addmess.innerText = "OK = 'old budget will be deleted.'";
                switch (categoryInput.value) {
                    case 'advance':
                        if (parseFloat(tem_adv[1]) > 0 ) {
                            const allowed = confirm(`1- budget was added, do you want to modify it ??`)
                            if  ( allowed ) { nameInput.placeholder = 'new amo'; deletebudget('advance')
                            } else { nameInput.value = 'ex- '; categoryInput.value=''}
                        } else { nameInput.placeholder = 'ex- '}
                        break;
                        
                    case 'forward':
                        nameInput.value = 'add budget : ' + categoryInput.value; 
                        if (parseFloat(tem_for[1]) > 0 ) {
                            const allowed = confirm(`2- budget was added, do you want to modify it ??`)
                            if  ( allowed ) { nameInput.placeholder = 'new amo'; deletebudget('forward')
                            } else { nameInput.value = 'x-'; categoryInput.value=''}
                        } else { nameInput.placeholder = 'x-'}
                        break;

                    default:
                        nameInput.placeholder = 'x:' + categoryInput.value ;
                        addmess.innerText = '"add expense tracking for mind free!"';
                    } 
                //amountInput.placeholder = 0.0;
            })
            
            // Helper delete budget //
            function deletebudget(byCategory) {
                let expenses = getExpenses();
                // remove from list then save all items again
                expenses = expenses.filter(expense => expense.category !== byCategory);
                addmess.innerText = '-- (del byCategory) filter exp cat : ' + byCategory;
                saveExpenses(expenses);
                loadExpenses(); // Reload the table to reflect the changes
            }            
            // Load expenses from local storage when the page loads
            function loadExpenses() {
                const expenses = getExpenses();
                console.log ("** getExpenses ==" , expenses.length);
                addmess.innerText = 'count: ' + expenses.length; 
                if ( expenses.length <= 0 ) return; 
                // Loading
                const expenseList = document.getElementById('expense-list');
                expenseList.innerHTML = "";
                var ii = 0; // ...
                budCount = 0;   xtotal=0;    budget=0;  console.log('-----------');
                expenses.forEach( expense => {
                    const mm1 = new Date(expense.date).getMonth();
                    const mm2 = monthConvert(mm1);
                    if (mm2===monthlabel.innerText) { addExpenseToTable(expense); ii += 1 };
                });
                addmess.innerText = 'count: ' + ii; 
                if (xtotal <= 0 ) totalmess.innerText = 'empty.';
                //console.log(expense.date, mm1, xtotal);
            }

            function addExpense() {
                const name      = nameInput.value.trim();
                const amount    = parseFloat(amountInput.value.replace(/e/g,""));
                const category  = categoryInput.value;
                let   added_mess  = '';
                // Validate inputs //
                if (name === '' || isNaN(amount) || amount <= 0 || category === '') {
                    console.log('addExpense => ', name, isNaN(amount),amount,category );
                    alert('(Not a number!) Please fill with valid data.');
                    return;
                }
                /* double 'advance' or 'forward' */// Stop the function from adding the duplicate
                const iscopied = budget_Duplicate( category );
                if ( iscopied && !confirm('budget is existed edit /cancel :: ( ' + name + ' = ' + amount)) {
                    added_mess = 'Not do any... ';
                    clear_Fields(added_mess);
                    console.log( '****', category, iscopied, added_mess);
                    return; 
                }
                //
                if ( category ==='advance') {
                    advanceAmo.innerText = amount_Format(amount);
                }
                if ( category ==='forward') {
                    forwardAmo.innerText = amount_Format(amount);
                }
                /* add now */
                const expense = {
                    id: Date.now(), // Unique ID for each expense
                    name: name,
                    amount: amount,
                    category: category,
                    date: new Date().toLocaleDateString()
                }; 
                // Retrieve existing expenses, add new one, and save
                const expenses = getExpenses();
                expenses.push(expense);
                saveExpenses(expenses);
                // refresh expense to the table
                loadExpenses();
                // Clear input fields
                added_mess = 'Added successfully! ';
                clear_Fields( added_mess ); 
            } // addExpense //
                        
            function getExpenses() {
                const expensesString = localStorage.getItem('expenses');
                return expensesString ? JSON.parse(expensesString) : [];
            }
            //*//
            function saveExpenses(expenses) {
                localStorage.setItem('expenses', JSON.stringify(expenses));
                loadExpenses(); // Reload the table to reflect the changes
            }
            //*//
            function addExpenseToTable(expense) {
                const expenseList = document.getElementById('expense-list');
                const row       = document.createElement('tr');
                const mon_num   = new Date(expense.date).getMonth();
                const date_num  = new Date(expense.date).getDate();
                const mon_name  = date_num + '-' + monthConvert(mon_num);

                switch ( expense.category ) {
                    case 'advance':
                        advanceAmo.innerText = '1.adv: '+ amount_Format(expense.amount);
                        advanceAmo.title = `1-adv: ${expense.name};  
                                            $$: ${expense.amount}; 
                                            cat: ${expense.category};  
                                            date: ${mon_name}; 
                                            id:${expense.id}`;
                        budget += expense.amount;
                        budCount += 1;
                        amobudget.innerText = amount_Format(budget) +'(budget:)' + budCount;
                        console.log(budCount, '*  budget = ', advanceAmo.innerText);
                        break;    
                        
                    case 'forward':
                        forwardAmo.innerText = '2.for: ' + amount_Format(expense.amount);
                        forwardAmo.title = `2-for: ${expense.name};
                                            $$: ${expense.amount};
                                            cat: ${expense.category};
                                            date: ${mon_name};
                                            id:${expense.id}`;
                        budget += expense.amount;
                        budCount += 1;
                        amobudget.innerText = amount_Format(budget) +'(budget:)' + budCount;
                        console.log(budCount, '** budget ==', forwardAmo.innerText);
                        break;

                    default:
                        row.innerHTML = `
                            <td><span class='x-view' onclick="viewExpense(${expense.id})">${expense.name}</span></td>
                            <td>$${amount_Format(expense.amount)}</td>
                            
                            <td>${mon_name}</td>
                            <td><button class='highlight' onclick="deleteExpense(${expense.id})">❌</button></td>
                        `;/* <td>${expense.category}</td> */
                         //<td><button class='editdate' onclick="editExpense(${expense.id})"> ${expense.date}</button></td>
                        expenseList.appendChild(row);
                        xtotal += expense.amount;
                        const theamo    = amount_Format(expense.amount);
                        console.log('exp-item ::: ' + theamo ,'|', mon_name);
                    }
                    totalmess.innerText = amount_Format(xtotal);
                    amobudget.innerText = amount_Format(budget) +'(budget:)' + budCount;
            }
            
            function viewExpense(id) {
                let expenses = getExpenses();
                const expense = expenses.filter(expense => expense.id == id);
                if ( !expense ) return;
                const { name, amount, category } = expense[0]; //console.log(id, name, amount, category);  
                nameInput.value = name ;
                amountInput.value = amount;
                categoryInput.value = category;
            }

            function deleteExpense(id) {
                if ( !confirm('Plz confirm (OK /Cancel) to delete expense! {need to reload}.' )) return;
                let expenses = getExpenses();
                // remove from list then save all items again
                expenses = expenses.filter(expense => expense.id !== id);
                saveExpenses(expenses);
                loadExpenses(); // Reload the table to reflect the changes
                addmess.innerText = '{ reload for update } - (del) exp id: ' + id ;
            }
        
        </script>
        <!-- Check for existing expense -->
        <script>
            function amount_Format(amount) {
                const temp = parseFloat(amount);
                return temp.toLocaleString('en-US', { 
                    minimumFractionDigits: 1, 
                    maximumFractionDigits: 2 
                });
            };

            function budget_Duplicate ( dupcate ) {
                const expenses = getExpenses();
                const isDuplicate = expenses.some( 
                    expense =>  expense.category === 'advance' || expense.category === 'advance' );
                //alert( dupcate , isDuplicate );
                if ( isDuplicate && ( dupcate === 'advance' || dupcate === 'forward' )) {
                    return true;
                } else { return false; }
            }
            // **
            function clear_Fields(clear_input) {
                nameInput.value = '';
                amountInput.value = '';
                categoryInput.value = '';
                amountInput.placeholder = 'Amount';
                addButton.innerText     = 'Add Expense';
                
                addmess.innerText = clear_input;
                setTimeout ( () => { addmess.innerText='' }, 5000);
            }

            //src="./main-script.js">
            function exportToCsv() {
                let expenses = getExpenses();
                if (expenses.length === 0) {
                    alert("No expenses to export.");
                    return;
                }
                // Define the CSV header
                let csvContent = "data:text/csv;charset=utf-8,";

                csvContent += `"Exported : ",  ${new Date().toLocaleString()}, _, _\r\n `;
                csvContent += "Name, Amount, Category, Date\r\n";
                // Add each expense row
                expenses.forEach(expense => {
                    let row = `"${expense.name}",${expense.amount},"${expense.category}","${expense.date}"`;
                    csvContent += row + "\r\n";
                });
                // Create a temporary link element to trigger the download
                const encodedUri = encodeURI(csvContent);
                const link   = document.createElement("a");
                let   mmonth = new Date().getMonth() + 1;        
                let   yyear  = new Date().getFullYear();        
                let   fname  = "Expenses-month-" + mmonth + "-" + yyear + ".csv"
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", fname);

                document.body.appendChild(link); // Required for Firefox
                link.click();
                document.body.removeChild(link);
                //
                addmess.innerText =  "Exported :: fileName = ''" + fname +"''";
                addmess.style.fontSize = '14px';
                addmess.style.color = 'blue';

                alert( addmess.innerText );
            }
        </script>
        
        <!-- Learn more -->
         <script>
            const imagePath = './learn_more.jpg'; // Replace with your image path
            const learn_more = document.getElementById('learn--more'); // image
            const learnmore = document.getElementById('learnmore');     // button
            
            /* learn more click */
            learnmore.addEventListener('click', (_) => {
                addmess.innerText = 'require file { ./learn_more.jpg } in same ./folder !';
                checkIfImageExists(imagePath, ( exists ) => {
                    if ( !exists ) { 
                        alert(`::learn_more:: "${imagePath}" ::does not exist.`);
                        return;
                    }
                    learn_more.src = imagePath;
                    learn_more.style.display = "block";
                    window.open(imagePath, '_blank');
                });
            });

            /* learn_more off */
            learn_more.addEventListener('click', () => {
                learn_more.style.display = "none";
            });

            // helper //
            function checkIfImageExists(imageUrl, callback) {
                const img = new Image();
                img.src = imageUrl;
                if (img.complete) { callback(true) }         // Image is already in cache or loaded immediately
                else {
                    img.onload = () =>  { callback(true) };   // Image loaded successfully
                    img.onerror = () => { callback(false) };  // Image failed to load (e.g., not found, broken link)
                }
            }
         </script>
    </body>
</html>
